name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Inject version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "__version__ = \"$VERSION\"" > desktop/_version.py
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Injected version: $VERSION"

      - name: Run tests
        working-directory: desktop
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run pytest tests/ -v

      - name: Create release archive
        run: |
          mkdir -p release-artifacts
          cp -r desktop/ release-artifacts/
          cp CLAUDE.md README.md DEVELOPMENT.md install.sh release-artifacts/ 2>/dev/null || true
          tar -czf quip-${{ env.VERSION }}.tar.gz -C release-artifacts .
          cd release-artifacts && zip -r ../quip-${{ env.VERSION }}.zip . && cd ..

      - name: Generate AI release notes
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          PREV=$(git tag -l 'v*' --sort=-v:refname | sed -n '2p')
          PREV="${PREV:-$(git rev-list --max-parents=0 HEAD)}"
          COMMITS="$(git log --oneline ${PREV}..HEAD)"
          STATS="$(git diff --stat ${PREV}..HEAD)"

          # Fall back to commit log if LLM secrets aren't configured
          if [ -z "$LLM_API_KEY" ] || [ -z "$LLM_BASE_URL" ]; then
            echo "LLM secrets not configured, using commit log for release notes."
            echo "## Changes" > RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            git log --pretty=format:"- %s" ${PREV}..HEAD >> RELEASE_NOTES.md
          else
            python3 -c "
          import json, urllib.request, os, sys
          base = os.environ['LLM_BASE_URL'].rstrip('/')
          body = json.dumps({
            'model': os.environ['LLM_MODEL'],
            'max_tokens': 1024,
            'messages': [{'role': 'user', 'content': '''Generate concise release notes for Quip ${{ github.ref_name }}.
          Quip is a frictionless thought capture tool - press hotkey, capture thought, back to work.
          Commits since last release:
          ${COMMITS}
          Diff stats:
          ${STATS}
          Format: brief intro sentence, then bulleted list grouped by category (Features, Fixes, Other). Keep it short.'''}]
          }).encode()
          req = urllib.request.Request(f'{base}/chat/completions',
            data=body,
            headers={'Authorization': f\"Bearer {os.environ['LLM_API_KEY']}\",
                     'Content-Type': 'application/json'})
          try:
            resp = json.loads(urllib.request.urlopen(req, timeout=30).read())
            print(resp['choices'][0]['message']['content'])
          except Exception as e:
            print(f'AI release notes failed ({e}), falling back to commit log.', file=sys.stderr)
            sys.exit(1)
          " > RELEASE_NOTES.md || {
              echo "## Changes" > RELEASE_NOTES.md
              echo "" >> RELEASE_NOTES.md
              git log --pretty=format:"- %s" ${PREV}..HEAD >> RELEASE_NOTES.md
            }
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES=$(cat RELEASE_NOTES.md)
          INSTALL_SECTION="

          ## Installation

          ### One-liner install (recommended):
          \`\`\`bash
          curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
          \`\`\`

          ### Manual install:
          \`\`\`bash
          wget https://github.com/${{ github.repository }}/archive/${{ github.ref_name }}.tar.gz
          tar -xzf ${{ github.ref_name }}.tar.gz
          cd quip-*/desktop
          uv sync
          uv run quip
          \`\`\`"

          gh release create "${{ github.ref_name }}" \
            quip-${{ env.VERSION }}.tar.gz \
            quip-${{ env.VERSION }}.zip \
            --title "Quip ${{ github.ref_name }}" \
            --notes "${NOTES}${INSTALL_SECTION}"
